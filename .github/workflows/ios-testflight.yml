name: iOS TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-upload-ios:
    runs-on: macos-latest

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        shell: bash
        run: |
          set -euo pipefail
          LATEST_XCODE="$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)"
          echo "Using Xcode at: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          python3 - <<'PY'
          import base64, os, pathlib
          data = base64.b64decode(os.environ["ASC_KEY_B64"])
          key_id = os.environ["ASC_KEY_ID"]
          out = pathlib.Path.home() / ".appstoreconnect" / "private_keys" / f"AuthKey_{key_id}.p8"
          out.write_bytes(data)
          print(f"Wrote {out}")
          PY
        env:
          ASC_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}

      - name: Decode signing files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/signing"
          python3 - <<'PY'
          import base64, os, pathlib
          root = pathlib.Path(os.environ["RUNNER_TEMP"]) / "signing"
          (root / "dist.p12").write_bytes(base64.b64decode(os.environ["P12_B64"]))
          (root / "profile.mobileprovision").write_bytes(base64.b64decode(os.environ["PROFILE_B64"]))
          print(root)
          PY
        env:
          P12_B64: ${{ secrets.IOS_P12_BASE64 }}
          PROFILE_B64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}

      - name: Install certificate and provisioning profile
        id: signing
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/signing/dist.p12"
          PROFILE_PATH="$RUNNER_TEMP/signing/profile.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Install CocoaPods
        shell: bash
        run: |
          set -euo pipefail
          cd ios
          pod install --repo-update

      - name: Build Flutter iOS without codesign
        shell: bash
        run: |
          set -euo pipefail
          if [ -f env.json ]; then
            flutter build ios --release --no-codesign --build-number="${{ github.run_number }}" --dart-define-from-file=env.json
          else
            flutter build ios --release --no-codesign --build-number="${{ github.run_number }}"
          fi

      - name: Archive signed app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing.outputs.profile_name }}" \
            archive

      - name: Create ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${{ steps.signing.outputs.profile_name }}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/exported"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath "$RUNNER_TEMP/exported" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/exported/*.ipa
          if-no-files-found: error

      - name: Upload to App Store Connect
        shell: bash
        run: |
          set -euo pipefail
          IPA_PATH="$(find "$RUNNER_TEMP/exported" -name '*.ipa' | head -n 1)"
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"